<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CostChef - Productos</title><link rel="stylesheet" href="css/style.css"></head><body><header><h2>CostChef - Catálogo de Recetas</h2></header><div class="container"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><input id="buscar" placeholder="Buscar receta..." style="max-width:350px"><div><a href="index.html"><button>Nueva receta</button></a><button id="exportar">Exportar JSON</button></div></div><h3>Mis recetas</h3><div id="contador"></div><div id="lista" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px"></div></div><script src="js/storage.js"></script><script>function card(r){return `<div style="border:1px solid #ddd;border-radius:10px;padding:16px"><h3>${r.nombre||'Sin nombre'}</h3><p><b>Categoría:</b> ${r.categoria||'-'}</p><p><b>Porciones:</b> ${r.porciones||0}</p><div><a href="receta.html?id=${r.id}"><button>Editar</button></a><button onclick="dup('${r.id}')">Duplicar</button><button onclick="delRec('${r.id}')">Eliminar</button></div></div>`}function render(d){lista.innerHTML=d.map(card).join('');contador.textContent=d.length+' receta(s)'}function load(){render(obtenerRecetas())}function dup(id){duplicarReceta(id);load()}function delRec(id){if(confirm('¿Eliminar?')){eliminarReceta(id);load()}}buscar.oninput=e=>{const t=e.target.value.trim();render(t?buscarRecetas(t):obtenerRecetas())};exportar.onclick=exportarJSON;load();</script></body></html>
