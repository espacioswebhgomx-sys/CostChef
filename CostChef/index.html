<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CostChef</title><style>body{font-family:Arial;background:#f4f6f8;margin:0}header{background:#1f4e78;color:#fff;padding:16px}.container{max-width:1100px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}.grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}input,select{width:100%;padding:8px}table{width:100%;border-collapse:collapse;margin-top:15px}th,td{border:1px solid #ccc;padding:6px}th{background:#e8eef5}button{padding:10px 16px;margin:6px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px}.summary div{background:#eef5ff;padding:8px}</style></head><body><header><h2>CostChef v1.0</h2></header><div class="container"><div class="grid"><div><label>Producto</label><input></div><div><label>Categoría</label><select><option>Pastel</option></select></div><div><label>Porciones</label><input id="porciones" type="number" value="1"></div></div><table id="t"><thead><tr><th>Ingrediente</th><th>Unidad</th><th>Cant. usada</th><th>Cant. compra</th><th>Precio compra</th><th>Costo</th></tr></thead><tbody><tr><td><input></td><td><input></td><td><input class="u" type="number"></td><td><input class="c" type="number"></td><td><input class="p" type="number"></td><td class="cost">0.00</td></tr></tbody></table><button onclick="addRow()">+ Ingrediente</button><h3>Gastos</h3>Gas<input id="gas" value="0">Luz<input id="luz" value="0">Agua<input id="agua" value="0">Empaque<input id="emp" value="0">Mano<input id="mo" value="0"><div class="summary"><div>Total Ingredientes:$<span id="ti">0</span></div><div>Gastos:$<span id="tg">0</span></div><div>Costo:$<span id="cp">0</span></div><div>Venta:$<span id="pv">0</span></div><div>Porción:$<span id="pp">0</span></div></div><button>Guardar</button></div><script>function calc(){let ti=0;document.querySelectorAll("#t tbody tr").forEach(r=>{let u=+r.querySelector(".u").value||0,c=+r.querySelector(".c").value||0,p=+r.querySelector(".p").value||0;let cost=c?u/c*p:0;r.querySelector(".cost").textContent=cost.toFixed(2);ti+=cost});let g=["gas","luz","agua","emp","mo"].reduce((a,i)=>a+(+document.getElementById(i).value||0),0);let cp=ti+g,pv=cp*1.4*1.16,por=+document.getElementById("porciones").value||1;ti.textContent;document.getElementById("ti").textContent=ti.toFixed(2);document.getElementById("tg").textContent=g.toFixed(2);document.getElementById("cp").textContent=cp.toFixed(2);document.getElementById("pv").textContent=pv.toFixed(2);document.getElementById("pp").textContent=(cp/por).toFixed(2)}function addRow(){let tr=document.querySelector("#t tbody tr").cloneNode(true);tr.querySelectorAll("input").forEach(i=>i.value="");tr.querySelector(".cost").textContent="0.00";document.querySelector("#t tbody").appendChild(tr);bind()}function bind(){document.querySelectorAll("input").forEach(i=>i.oninput=calc)}bind();calc();</script></body></html>
